<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deskmate - Documents</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1d3557;
        }

        .upload-zone {
            border: 2px dashed #a8dadc;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            background-color: white;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.2s;
        }

        .upload-zone:hover {
            border-color: #457b9d;
            background-color: #f1faee;
        }

        .upload-zone.dragover {
            border-color: #1d3557;
            background-color: #f1faee;
        }

        .upload-zone h3 {
            font-size: 18px;
            color: #1d3557;
            margin-bottom: 8px;
        }

        .upload-zone p {
            font-size: 14px;
            color: #457b9d;
            margin-bottom: 20px;
        }

        .upload-zone input[type="file"] {
            display: none;
        }

        .upload-progress {
            display: none;
            margin-top: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #f1faee;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #457b9d;
            width: 0%;
            transition: width 0.3s;
        }

        .docs-header {
            font-size: 18px;
            font-weight: 600;
            color: #1d3557;
            margin-bottom: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #457b9d;
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="sidebar">
            <div class="logo">Deskmate</div>
            <a href="/dashboard.html">Dashboard</a>
            <a href="/documents.html" class="active">Documents</a>
            <a href="/widget.html">Widget</a>
            <div style="margin-top: auto; padding-top: 20px;">
                <button class="btn-danger" style="width:100%" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <h1>Documents</h1>
            </div>

            <div id="upload-alert"></div>

            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
                <h3>Upload Documents</h3>
                <p>Drag and drop your PDF files here, or click to browse</p>
                <button class="btn-primary" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Select Files</button>
                <input type="file" id="file-input" accept=".pdf" multiple onchange="handleFileUpload(this.files)">
                <div class="upload-progress" id="upload-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="docs-header">Your Documents</div>
                <div id="docs-list">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/documents.js"></script>
</body>
</html>
