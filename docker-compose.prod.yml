version: "3.9"

services:
  api:
    build: .
    env_file:
      - .env
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      - postgres
      - qdrant
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    restart: always

  celery_worker:
    build: .
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      - redis
      - postgres
      - qdrant
    restart: always

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdesk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  redis:
    image: redis:7
    restart: always

volumes:
  postgres_data:
  qdrant_data:
  uploads_data: